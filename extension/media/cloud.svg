<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="cloudGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d32f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Main cloud body -->
  <path d="M 20 35
           Q 15 35 15 40
           Q 15 50 25 50
           L 75 50
           Q 85 50 85 40
           Q 85 35 80 35
           Q 80 25 70 25
           Q 65 15 50 15
           Q 35 15 30 25
           Q 20 25 20 35"
        fill="url(#cloudGradient)"
        stroke="#8b0000"
        stroke-width="1"/>

  <!-- Smaller upper cloud puff -->
  <path d="M 30 20
           Q 25 20 25 25
           Q 25 30 30 30
           L 45 30
           Q 50 30 50 25
           Q 50 20 45 20
           Q 45 15 40 15
           Q 35 15 30 20"
        fill="url(#cloudGradient)"
        stroke="#8b0000"
        stroke-width="1"
        opacity="0.8"/>

  <!-- Right side cloud extension -->
  <path d="M 65 20
           Q 60 20 60 25
           Q 60 30 65 30
           L 80 30
           Q 85 30 85 25
           Q 85 20 80 20
           Q 80 15 75 15
           Q 70 15 65 20"
        fill="url(#cloudGradient)"
        stroke="#8b0000"
        stroke-width="1"
        opacity="0.9"/>
</svg>
