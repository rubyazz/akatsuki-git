<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff1744;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#d50000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer black ring -->
  <circle cx="50" cy="50" r="45" fill="#1a1a1a" stroke="#000" stroke-width="2"/>

  <!-- Iris red background -->
  <circle cx="50" cy="50" r="38" fill="url(#eyeGradient)" filter="url(#glow)"/>

  <!-- Inner black ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Pupil -->
  <circle cx="50" cy="50" r="12" fill="#1a1a1a"/>

  <!-- Tomoe (comma-shaped marks) -->
  <!-- Top tomoe -->
  <g transform="translate(50, 50)">
    <path d="M -3 -22
             Q -8 -18 -6 -12
             Q -4 -8 -2 -8
             Q 2 -8 4 -12
             Q 6 -18 2 -22
             Q -1 -24 -3 -22"
          fill="#1a1a1a"/>
  </g>

  <!-- Bottom right tomoe -->
  <g transform="translate(50, 50) rotate(120)">
    <path d="M -3 -22
             Q -8 -18 -6 -12
             Q -4 -8 -2 -8
             Q 2 -8 4 -12
             Q 6 -18 2 -22
             Q -1 -24 -3 -22"
          fill="#1a1a1a"/>
  </g>

  <!-- Bottom left tomoe -->
  <g transform="translate(50, 50) rotate(240)">
    <path d="M -3 -22
             Q -8 -18 -6 -12
             Q -4 -8 -2 -8
             Q 2 -8 4 -12
             Q 6 -18 2 -22
             Q -1 -24 -3 -22"
          fill="#1a1a1a"/>
  </g>

  <!-- Highlight -->
  <ellipse cx="58" cy="42" rx="6" ry="8" fill="white" opacity="0.3"/>
</svg>
